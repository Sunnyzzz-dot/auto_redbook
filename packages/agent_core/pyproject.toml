[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-core"
version = "0.1.0"
description = "Framework-free ReAct runtime for Red Book Agent."
requires-python = ">=3.11"
dependencies = ["pydantic>=2.7"]

[tool.setuptools.packages.find]
where = ["."]

