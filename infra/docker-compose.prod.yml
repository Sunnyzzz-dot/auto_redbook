services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-redbook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-redbook_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${POSTGRES_USER:-redbook}\" -d \"${POSTGRES_DB:-redbook_agent}\""]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data

  migrate:
    image: postgres:16
    restart: "no"
    env_file:
      - ../.env.production
    volumes:
      - ./migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -c
      - psql "${SYNC_DATABASE_URL}" -f /migrations/001_initial.sql

  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env.production
    volumes:
      - api_uploads:/app/apps/api/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=5)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: ..
      dockerfile: infra/docker/web.Dockerfile
    restart: unless-stopped
    expose:
      - "80"

  worker:
    build:
      context: ..
      dockerfile: infra/docker/worker.Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env.production
    environment:
      API_BASE_URL: http://api:8000
      API_WS_URL: ws://api:8000
      BROWSER_PROFILES_DIR: /app/apps/worker/profiles
      SCREENSHOTS_DIR: /app/apps/worker/screenshots
      HEADLESS: "true"
      WORKER_ID: ${WORKER_ID:-cloud-worker}
      MACHINE_NAME: ${MACHINE_NAME:-volcengine-ecs}
    volumes:
      - worker_profiles:/app/apps/worker/profiles
      - worker_screenshots:/app/apps/worker/screenshots
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:
  api_uploads:
  worker_profiles:
  worker_screenshots:
